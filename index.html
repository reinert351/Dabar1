    <script>
      // 1. Definição Global de Proteção Titan
      window.process = { env: { API_KEY: "" } };

      // Bloqueio de Ruído de Console para Origin Policy (ServiceWorker)
      const originalError = console.error;
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('ServiceWorker')) return;
        originalError.apply(console, args);
      };
