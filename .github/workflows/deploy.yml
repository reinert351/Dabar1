import { useEffect, useRef } from 'react';
import { auth, db } from '../services/firebase';
import { doc, onSnapshot, setDoc } from 'firebase/firestore';
import { onAuthStateChanged } from 'firebase/auth';

export const useSessionMonitor = () => {
  const isSetup = useRef(null);
  const instanceIdRef = useRef(null);

  useEffect(() => {
    // 🔑 ID único por aba/dispositivo
    const instanceId =
      "v3_" +
      Math.random().toString(36).substring(2, 10) +
      "_" +
      Date.now();

    instanceIdRef.current = instanceId;

    let unsubscribe = null;

    console.log(`[SESSION] Iniciado. ID: ${instanceId}`);

    const unsubAuth = onAuthStateChanged(auth, async (user) => {
      // limpar listener antigo
      if (unsubscribe) {
        unsubscribe();
        unsubscribe = null;
      }

      if (!user) {
        isSetup.current = null;
        return;
      }

      // evita duplicar setup
      if (isSetup.current === user.uid) return;
      isSetup.current = user.uid;

      const userRef = doc(db, 'users', user.uid);

      console.log(`[SESSION] Monitorando: ${user.email}`);

      try {
        // 🔥 IMPORTANTE: cria ou atualiza o documento
        await setDoc(
          userRef,
          {
            lastSessionId: instanceId,
            lastLoginAt: new Date().toISOString(),
          },
          { merge: true }
        );

        console.log(`[SESSION] Sessão registrada: ${instanceId}`);
      } catch (err) {
        console.error("[SESSION] Erro ao salvar sessão:", err);
      }

      let firstLoad = true;

      // 👀 escuta mudanças em tempo real
      unsubscribe = onSnapshot(
        userRef,
        (snapshot) => {
          if (!snapshot.exists()) return;

          const data = snapshot.data();
          const serverSid = data.lastSessionId;

          console.log(
            `[SESSION CHECK] Local=${instanceId} | DB=${serverSid}`
          );

          // 🚫 ignora primeira leitura (evita falso logout)
          if (firstLoad) {
            firstLoad = false;
            return;
          }

          // 🚨 DETECTA OUTRA SESSÃO
          if (serverSid && serverSid !== instanceIdRef.current) {
            console.warn("[SESSION] Outra sessão detectada!");

            alert(
              "Sua conta foi acessada em outro dispositivo. Você será desconectado."
            );

            auth.signOut().then(() => {
              window.location.reload();
            });
          }
        },
        (error) => {
          console.error("[SESSION] Erro no listener:", error);
        }
      );
    });

    return () => {
      unsubAuth();
      if (unsubscribe) unsubscribe();
    };
  }, []);
};
