import { useEffect, useRef } from 'react';
import { auth, db } from '../services/firebase';
import { doc, onSnapshot, setDoc } from 'firebase/firestore';
import { onAuthStateChanged } from 'firebase/auth';

export const useSessionMonitor = () => {
  const isSetup = useRef(null);
  const instanceIdRef = useRef(null);

  useEffect(() => {
    const instanceId =
      "v3_" +
      Math.random().toString(36).substring(2, 10) +
      "_" +
      Date.now();

    instanceIdRef.current = instanceId;

    let unsubscribe = null;

    console.log(`[SESSION] Iniciado. ID: ${instanceId}`);

    const unsubAuth = onAuthStateChanged(auth, async (user) => {
      if (unsubscribe) {
        unsubscribe();
        unsubscribe = null;
      }

      if (!user) {
        isSetup.current = null;
        return;
      }

      if (isSetup.current === user.uid) return;
      isSetup.current = user.uid;

      const userRef = doc(db, 'users', user.uid);

      console.log(`[SESSION] Monitorando: ${user.email}`);

      try {
        await setDoc(
          userRef,
          {
            lastSessionId: instanceIdRef.current,
            lastLoginAt: new Date().toISOString(),
          },
          { merge: true }
        );

        console.log(`[SESSION] Sessão registrada`);
      } catch (err) {
        console.error("[SESSION] Erro ao salvar sessão:", err);
      }

      let initialized = false;

      unsubscribe = onSnapshot(
        userRef,
        (snapshot) => {
          if (!snapshot.exists()) return;

          const data = snapshot.data();
          const serverSid = data.lastSessionId;

          console.log(
            `[SESSION CHECK] Local=${instanceIdRef.current} | DB=${serverSid}`
          );

          // ignora primeira sincronização
          if (!initialized) {
            initialized = true;
            return;
          }

          // pequeno delay evita conflito falso
          setTimeout(() => {
            if (
              serverSid &&
              serverSid !== instanceIdRef.current
            ) {
              console.warn("[SESSION] Sessão tomada por outro dispositivo");

              alert(
                "Sua conta foi acessada em outro dispositivo. Você será desconectado."
              );

              auth.signOut().then(() => {
                window.location.reload();
              });
            }
          }, 500);
        },
        (error) => {
          console.error("[SESSION] Erro no listener:", error);
        }
      );
    });

    return () => {
      unsubAuth();
      if (unsubscribe) unsubscribe();
    };
  }, []);
};
